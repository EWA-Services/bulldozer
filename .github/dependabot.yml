# This file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten.
---
# Dependabot parses HH:MM times as strings; keep schedule times quoted.
# yamllint disable rule:quoted-strings
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies
