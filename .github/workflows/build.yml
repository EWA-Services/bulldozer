name: Build

on:
  push:
    tags-ignore:
      - "**"

  pull_request:

  release:
    types: [published]

jobs:
  Verify:
    runs-on: ubuntu-latest

    env:
      GOPATH: /home/runner/go

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Go version
        id: go_version
        run: |
          GO_VERSION=$(sed -E -n '/^go / s/^go ([0-9]+\.[0-9]+)(\.[0-9]+)?$/\1/p' < go.mod)
          echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Cache Godel assets
        uses: actions/cache@v5
        with:
          path: ~/.godel
          key: ${{ runner.os }}-godel-${{ hashFiles('godelw', 'godel/config/godel.yml') }}
          restore-keys: |
            ${{ runner.os }}-godel-

      - name: Verify
        run: ./godelw verify --apply=false

  Dist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GOPATH: /home/runner/go

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Go version
        id: go_version
        run: |
          GO_VERSION=$(sed -E -n '/^go / s/^go ([0-9]+\.[0-9]+)(\.[0-9]+)?$/\1/p' < go.mod)
          echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Cache Godel assets
        uses: actions/cache@v5
        with:
          path: ~/.godel
          key: ${{ runner.os }}-godel-${{ hashFiles('godelw', 'godel/config/godel.yml') }}
          restore-keys: |
            ${{ runner.os }}-godel-

      - name: Build distribution
        run: ./godelw dist

      - name: Build Docker image
        run: ./godelw docker build --verbose

      - name: Archive distribution
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            build/bulldozer/*/bin/*.tgz

      #
      # Steps after this point should only run when publishing
      # Include them here to avoid exporting the Docker container as an artifact
      #

      - name: Publish release assets
        if: ${{ github.event_name == 'release' }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          ./godelw publish github --add-v-prefix --api-url="${GITHUB_API_URL}" --user="${GITHUB_REPOSITORY_OWNER}" --repository="${repo_name}" --token="${{ secrets.GITHUB_TOKEN }}"

  ci-all:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs:
      - Verify
      - Dist
    steps:
    - name: Check required job results
      run: |
        if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
          echo "One or more required jobs did not succeed"
          echo '${{ toJSON(needs) }}'
          exit 1
        fi
        echo "All required jobs succeeded"
