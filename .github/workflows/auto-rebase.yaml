# This file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten
---
name: Auto Rebase
on:
  push: {}

permissions:
  contents: write      # To checkout code and push rebased branches
  issues: write        # To comment on PRs that cannot be rebased
  pull-requests: read  # To list open PRs

jobs:
  rebase:
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    runs-on: finn-runners
    steps:
      - name: Setup GPG for signed commits
        uses: EWA-Services/EWA-Actions/.github/actions/verified-commit@main
        with:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.FINN_DEVOPS_PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Get open PRs
        id: prs
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          github-token: ${{ secrets.FINN_DEVOPS_PERSONAL_ACCESS_TOKEN }}
          script: |
            const baseBranch = context.payload.repository.default_branch;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: baseBranch,
              per_page: 100
            });

            // Filter out draft PRs
            const nonDraftPRs = prs.filter(pr => !pr.draft);

            core.setOutput('pr_list', JSON.stringify(nonDraftPRs.map(pr => ({
              number: pr.number,
              head_ref: pr.head.ref,
              head_sha: pr.head.sha,
              head_repo: pr.head.repo?.full_name
            }))));

      - name: Rebase PRs
        id: rebase-prs
        env:
          BASE_REF: ${{ github.event.repository.default_branch }}
          PRS_JSON: ${{ steps.prs.outputs.pr_list }}
        run: |
          .github/scripts/auto_rebase_prs.sh

      - name: Comment on rebase failures
        if: steps.rebase-prs.outputs.failed_count != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          FAILURES_FILE: ${{ steps.rebase-prs.outputs.failures_file }}
        with:
          github-token: ${{ secrets.FINN_DEVOPS_PERSONAL_ACCESS_TOKEN }}
          script: |
            const fs = require('fs');
            const failures = fs.readFileSync(process.env.FAILURES_FILE, 'utf8')
              .trim()
              .split('\n')
              .filter(Boolean)
              .map(line => JSON.parse(line));

            for (const failure of failures) {
              const marker = '<!-- auto-rebase-failure -->';
              const body = [
                marker,
                '❌ Auto rebase could not update this PR.',
                '',
                `Reason: \`${failure.reason}\``,
                '',
                failure.details,
                '',
                'The workflow will retry after the next default-branch push.'
              ].join('\n');

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: failure.pr_number,
                per_page: 100
              });
              const existing = comments.find(comment => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: failure.pr_number,
                  body
                });
              }
            }

      - name: Fail when any PR could not be rebased
        if: steps.rebase-prs.outputs.failed_count != '0'
        run: |
          echo "Failed to rebase ${{ steps.rebase-prs.outputs.failed_count }} PR(s)."
          exit 1
