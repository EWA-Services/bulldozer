# This workflow file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten
---
name: AI Label Check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - labeled
      - unlabeled
      - reopened
      - ready_for_review

permissions: {}

jobs:
  ai-assistance-disclosure:
    name: AI Label Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate AI usage details
        uses: ./.github/actions/ai-assistance-disclosure
        with:
          github-token: ${{ github.token }}
